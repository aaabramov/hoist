name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6

      - name: Build
        run: make build

      - name: Ad-hoc sign app
        run: codesign --force --deep --sign - --identifier "com.iamandrii.hoist" Hoist.app

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Hoist" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Hoist.app" 150 190 \
            --app-drop-link 450 190 \
            Hoist.dmg \
            Hoist.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: Hoist.dmg
          generate_release_notes: true
          body: |
            ## Installation

            ### Option 1: Homebrew (recommended)
            ```
            brew install --cask aaabramov/hoist/hoist
            ```

            ### Option 2: Install script
            ```
            curl -fsSL https://raw.githubusercontent.com/aaabramov/Hoist/master/install.sh | bash
            ```

            ### Option 3: Manual
            1. Download `Hoist.dmg`, open it, and drag `Hoist.app` to Applications
            2. Remove the quarantine attribute (required for accessibility permissions):
               ```
               xattr -cr /Applications/Hoist.app
               ```
            3. Launch Hoist and grant Accessibility permission when prompted

      - name: Update Homebrew Cask
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(shasum -a 256 Hoist.dmg | awk '{print $1}')

          git clone https://x-access-token:${GH_TOKEN}@github.com/aaabramov/homebrew-hoist.git /tmp/homebrew-hoist
          cd /tmp/homebrew-hoist

          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/hoist.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Casks/hoist.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/hoist.rb
          git commit -m "Update Hoist to v${VERSION}"
          git push
